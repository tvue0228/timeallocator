<style>
:root {
  --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  --color-text-primary: #111827;
  --color-text-secondary: #6b7280;
  --color-text-tertiary: #9ca3af;
  --color-text-success: #15803d;
  --color-text-danger: #b91c1c;
  --color-text-info: #1d4ed8;
  --color-background-primary: #ffffff;
  --color-background-secondary: #f3f4f6;
  --color-background-success: #dcfce7;
  --color-background-danger: #fee2e2;
  --color-border-tertiary: #e5e7eb;
  --color-border-info: #93c5fd;
  --border-radius-md: 8px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font-sans); background: var(--color-background-primary); color: var(--color-text-primary); }
.wrap { padding: 1.5rem 0; max-width: 560px; margin: 0 auto; }
.section { margin-bottom: 1.5rem; }
label { font-size: 13px; color: var(--color-text-secondary); display: block; margin-bottom: 6px; }
.row { display: flex; gap: 10px; align-items: center; }
input[type=time], input[type=number] { flex: 1; }
.stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 1rem; }
.stat { background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 1rem; }
.stat-label { font-size: 12px; color: var(--color-text-secondary); margin-bottom: 4px; }
.stat-val { font-size: 22px; font-weight: 500; color: var(--color-text-primary); }
.stat-sub { font-size: 12px; color: var(--color-text-tertiary); margin-top: 2px; }
.pill { display: inline-block; font-size: 12px; padding: 3px 10px; border-radius: 99px; margin-bottom: 1rem; }
.pill-green { background: var(--color-background-success); color: var(--color-text-success); }
.pill-red { background: var(--color-background-danger); color: var(--color-text-danger); }
.divider { border: none; border-top: 0.5px solid var(--color-border-tertiary); margin: 1.25rem 0; }
.per-person-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 10px; margin-top: 0.75rem; }
.mini-card { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-md); padding: 0.75rem 1rem; text-align: center; }
.mini-val { font-size: 18px; font-weight: 500; }
.mini-label { font-size: 11px; color: var(--color-text-secondary); margin-top: 2px; }
</style>

<div class="wrap">
  <h2 class="sr-only">Time remaining calculator — enter a target time and number of chunks to see how much time each chunk gets</h2>

  <div class="section">
    <label for="target-time">Target time</label>
    <input type="time" id="target-time" value="20:30" />
  </div>

  <div class="section">
    <label for="num-people">Number of chunks</label>
    <div class="row">
      <input type="number" id="num-people" min="1" max="100" value="4" style="max-width: 120px;" />
      <span style="font-size: 13px; color: var(--color-text-secondary);">chunks sharing the time equally</span>
    </div>
  </div>

  <div id="output"></div>
</div>

<script>
function fmt(totalMins) {
  if (totalMins < 0) return null;
  const h = Math.floor(totalMins / 60);
  const m = Math.round(totalMins % 60);
  const s = Math.floor((totalMins * 60) % 60);
  if (h > 0 && m > 0) return `${h}h ${m}m`;
  if (h > 0) return `${h}h`;
  if (m > 0) return `${m}m`;
  return `${s}s`;
}

function fmtSec(totalSecs) {
  if (totalSecs < 60) return `${Math.round(totalSecs)}s`;
  return fmt(totalSecs / 60);
}

function render() {
  const timeInput = document.getElementById('target-time').value;
  const people = parseInt(document.getElementById('num-people').value) || 1;
  const out = document.getElementById('output');

  if (!timeInput) { out.innerHTML = ''; return; }

  const now = new Date();
  const [h, m] = timeInput.split(':').map(Number);
  const target = new Date();
  target.setHours(h, m, 0, 0);

  let diffMs = target - now;
  const isPast = diffMs < 0;

  if (isPast) {
    out.innerHTML = `<span class="pill pill-red"><i class="ti ti-clock-x" aria-hidden="true"></i> That time has already passed today</span>`;
    return;
  }

  const diffMins = diffMs / 60000;
  const diffSecs = diffMs / 1000;
  const perPersonMins = diffMins / people;

  const totalStr = fmt(diffMins);
  const perStr = perPersonMins < 1 ? fmtSec(perPersonMins * 60) : fmt(perPersonMins);

  out.innerHTML = `
    <span class="pill pill-green"><i class="ti ti-clock-check" aria-hidden="true"></i> Time remaining</span>
    <div class="stat-grid">
      <div class="stat">
        <div class="stat-label">Total time left</div>
        <div class="stat-val">${totalStr}</div>
        <div class="stat-sub">${Math.round(diffMins)} min total</div>
      </div>
      <div class="stat">
        <div class="stat-label">Per chunk</div>
        <div class="stat-val">${perStr}</div>
        <div class="stat-sub">with ${people} ${people === 1 ? 'chunk' : 'chunks'}</div>
      </div>
    </div>
    <hr class="divider" />
    <label style="font-size:13px; color: var(--color-text-secondary);">Per-chunk breakdown by group size</label>
    <div class="per-person-grid">
      ${[1,2,3,4,5,6].filter(n => n !== people).concat([people]).sort((a,b)=>a-b).map(n => {
        const ppMin = diffMins / n;
        const ppStr = ppMin < 1 ? fmtSec(ppMin * 60) : fmt(ppMin);
        const isActive = n === people;
        return `<div class="mini-card" style="${isActive ? 'border-color: var(--color-border-info); border-width: 2px;' : ''}">
          <div class="mini-val" style="${isActive ? 'color: var(--color-text-info);' : ''}">${ppStr}</div>
          <div class="mini-label">${n} ${n === 1 ? 'chunk' : 'chunks'}</div>
        </div>`;
      }).join('')}
    </div>
  `;
}

document.getElementById('target-time').addEventListener('input', render);
document.getElementById('num-people').addEventListener('input', render);

render();
setInterval(render, 10000);
</script>
